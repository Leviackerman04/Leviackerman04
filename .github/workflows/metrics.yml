name: Generate GitHub Metrics

on:
  workflow_dispatch:

  push:
    branches:
      - main

  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: Leviackerman04
          filename: metrics.svg

          template: classic
          base: header, activity, community, repositories, metadata

          config_timezone: America/Santo_Domingo

          plugin_languages: yes
          plugin_languages_limit: 12
          plugin_languages_threshold: 0%
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: programming, markup
          plugin_languages_recent_categories: programming, markup
          plugin_languages_recent_days: 14
          plugin_languages_indepth: yes
          plugin_languages_details: percentage, bytes-size

          plugin_isocalendar: yes

          plugin_lines: yes

          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes

          plugin_followup: yes

          plugin_repositories: yes
          plugin_repositories_featured: Leviackerman04/portfolio,Leviackerman04/UAPA-VALPRO
          plugin_repositories_order: featured, pinned, starred, random

          plugin_topics: yes
          plugin_topics_limit: 20
          plugin_topics_mode: icons

          plugin_introduction: yes
          plugin_introduction_title: yes
