name: Generate Metrics (Stats + Languages)

on:
  schedule:
    - cron: "0 0 * * *"   # se regenera 1 vez al día
  workflow_dispatch:        # también puedes correrlo manualmente
  push:
    branches:
      - main

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: Leviackerman04
          template: classic
          base: header, activity, community, repositories, metadata
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_threshold: 0%
          plugin_languages_limit: 12
          plugin_languages_indepth: yes
          plugin_languages_details: percentage, bytes-size
          config_timezone: America/Santo_Domingo
          filename: metrics.svg
